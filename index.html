<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{margin: 0px;}

        
        .main{
            width: 100%;
            height: 100vh;
            background-color: rgba(13, 7, 7, 0.823);
            justify-content: center;
            align-items: center;
            display: flex;
        
    font-family: 'Poppins', sans-serif;
        }

        .box1{
            width: 33%;
            margin: 20px;
            justify-content:center;
            align-items: center;
            border-radius: 25px;
            background-color: rgb(43, 30, 30);
            height: 76vh;
            box-shadow: 5px 5px 5px rgb(75, 71, 71),-5px -5px 10px rgb(75, 71, 71);
        }
        .box2{
            width: 34%;
            margin: 20px;
            justify-content:center ;
            align-items: center;
            border-radius: 25px;
            background-color: rgb(43, 30, 30);
            height: 76vh;
            box-shadow: 5px 5px 5px rgb(75, 71, 71),-5px -5px 10px rgb(75, 71, 71);
        }
        .box3{
            width: 33%;
            margin: 20px;
            justify-content:center ;
            align-items: center;
            border-radius: 25px;
            background-color: rgb(43, 30, 30);
            height: 76vh;
            box-shadow: 5px 5px 5px rgb(75, 71, 71),-5px -5px 10px rgb(75, 71, 71);
        }
        .a{
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .b{
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .c{
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        h3{
            color: aqua;
            font-size: 20px;
            margin: 10px;
        }
        h5{
            color: white;
            font-size: 30px;
            margin: 10px;
        }
        p{
            color: white;
            font-size: 15px;
            margin: 10px;
        }
        img{
            width: 100%;
            height: 50vh;
            border-radius: 25px;
        }
.box1,.box2,.box3{
    transition: 0.4s;
}

.box1:hover,
.box2:hover,
.box3:hover{
    transform: translateY(-10px);
    box-shadow: 0px 0px 25px rgb(75, 71, 71);
}
    </style>
</head>
<body>
            

    <div class="main">
        <div class="box1">
            <div><img src="phone.jpg" alt=""></div>
            <div class="a">
                <h5>MOBILE PHONE</h5>
                <H3>$199.99</H3>
                <P>Lorem ipsum dolouam porro doloribus sed!</P>
            </div>
            </div>
        <div class="box2">
            <div><img src="laptop.jpg" alt=""></div>
            <div class="b">
                <h5>LAPTOP</h5>
                <H3>$399.99</H3>
                <P>Lorem ipsum dolouam porro doloribus sed!</P>
            </div>
            </div>
        <div class="box3">
            <div><img src="headphones.jpg" alt=""></div>
            <div class="c">
                <h5>HEADPHONES</h5>
                <H3>$150.99</H3>
                <P>Lorem ipsum dolouam porro doloribus sed!</P>
            </div>
        
    </div>
</body>
</html>
